name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: communityboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Build backend
        working-directory: ./backend
        run: mvn clean package -DskipTests
      - name: Run tests
        working-directory: ./backend
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/communityboard
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  codeqwality
    name: codeQL analysis
    runs-on: ubuntu-latest
    steps:
      - name checkout repository
        uses: actions/checkout@v4
      - name: Run codeQL analysis
        uses: github/codeql-action/analyze@v2
        with: 
          languages: java, javascript
      - name: Auto build
        uses: actions/codeql-actions/autobuild@v3
      - name: Run codeQL analysis
        uses: github/codeql-action/analyze@v2
  gitleaks:
    name: gitleaks analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v4
      - name: checkout repository
        uses: actions/checkout@v4
  trivy: 
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v2
        with:
          scan-type: fs
          scan-target: ./
          scan-options: --exit-code 1
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v2
        with:
          scan-type: image
          scan-target: ./
          scan-options: --exit-code 1
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t communityboard-backend ./backend
      - name: Tag Docker image
        run: docker tag communityboard-backend ${{ secrets.DOCKER_USERNAME }}/communityboard-backend:${{ github.sha }}
      - name: Push Docker image to ECR  
        run: aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/communityboard-backend:${{ github.sha }}

