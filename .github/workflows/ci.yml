name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: communityboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Build backend
        working-directory: ./backend
        run: mvn clean package -DskipTests
      - name: Run tests
        working-directory: ./backend
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/communityboard
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  codeqwality
    name: codeQL analysis
    runs-on: ubuntu-latest
    steps:
      - name checkout repository
        uses: actions/checkout@v4
      - name: Run codeQL analysis
        uses: github/codeql-action/analyze@v2
        with: 
          languages: java, javascript
      - name: Auto build
        uses: actions/codeql-actions/autobuild@v3
      - name: Run codeQL analysis
        uses: github/codeql-action/analyze@v2
  gitleaks:
    name: gitleaks analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v4
      - name: checkout repository
        uses: actions/checkout@v4
  trivy: 
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v2
        with:
          scan-type: fs
          scan-target: ./
          scan-options: --exit-code 1
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v2
        with:
          scan-type: image
          scan-target: ./
          scan-options: --exit-code 1
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write   # required for OIDC
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t communityboard-backend ./backend

      - name: Tag and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: communityboard-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag communityboard-backend $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      

